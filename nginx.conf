load_module modules/ngx_http_js_module.so;

events {}
http {

    large_client_header_buffers 8 128k;

    # Response header buffering (proxy path safety)
    proxy_buffer_size          128k;
    proxy_buffers              16 128k;
    proxy_busy_buffers_size    256k;

    # FastCGI / generic safety (even if unused)
    fastcgi_buffer_size        128k;
    fastcgi_buffers            16 128k;

    # Output buffering
    output_buffers             4 128k;

    # Disable limits that could interfere
    client_max_body_size       50m;

    js_import http.js;

    js_set $hash            http.hash;
    js_set $path_rule       http.path_rule;
    js_set $iframe_rule     http.iframe_rule;
    js_set $summary         http.summary;

    resolver 10.0.0.1;

    server {
        listen 8080;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # location /home.png {
        #     alias /usr/share/nginx/html/home.png;
        #     types {
        #         image/png png;
        #     }           
        # }
        location ~* \.(png|jpg)$ {
            root /usr/share/nginx/html;
            types {
                image/png   png;
                image/jpeg  jpg;
            }
        }

        location = /output-body {
            return 200 $path_rule;
        }

        location = /output-fixed {
            add_header X-Debug "test";
            return 200 "OK";
        }

        location = /echo-body {
            js_content http.echo_body;
        }

        location = /echo-headers {
            js_content http.echo_headers;
        }

        location = /echo-cookies {
            js_content http.echo_cookies;
        }

        # =========================
        # WAF TEST ZONE (proxy path)
        # =========================
        location = /waf-bypass {
            return 200 $path_rule;
        }

        location = /hash {
            return 200 $hash;
        }

        location = /hello {
            return 200 $path_rule;
        }

        location = /redirect {
            return 302 https://reflect.archf5.com/redirected;
        }

        location = /redirected {
            return 200 $path_rule;
        }
        
        location = /output-headers {
            return 200 $path_rule;
        }

        location = /output-headers-safe {
            return 200 $path_rule;
        }

        location = /scripts {
            return 200 $path_rule;
        }

        location = /summary {
            return 200 $path_rule;
        }

        location = /index-iframe.html  {
            return 200 $iframe_rule;
        }
        
        location = /framebust.html  {
            return 200 $iframe_rule;
        }
        
        location = /iframe-http.html  {
            return 200 $iframe_rule;
        }
        
        location = /iframe-https.html  {
            return 200 $iframe_rule;
        }
        
        location = /iframe-sandbox-https.html  {
            return 200 $iframe_rule;
        }
        
        location = /xframes/xframe-https.html  {
            return 200 $iframe_rule;
        }
        
        location = /framebust.js  {
            return 200 $iframe_rule;
        }
        
        location = /offdomain.js  {
            return 200 $iframe_rule;
        }
        
        location = /ondomain.js  {
            return 200 $iframe_rule;
        }
        
        location = /sandbox-check.js  {
            return 200 $iframe_rule;
        }
    }
}
